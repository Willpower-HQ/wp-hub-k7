<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Event · Willpower Outreach HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/hub.css">
<link rel="icon" href="assets/img/willpower-bird.png">
</head>
<body>
<div class="masthead"><div class="wrap">
  <a class="brand" href="index.html"><img class="logo" src="assets/img/willpower-logo.png" alt="Willpower"><span class="tag">Outreach HQ</span></a>
  <div class="nav">
    <a href="index.html">Events</a>
    <a href="events-map.html">City Scout</a>
    <a href="contacts.html">Contacts</a>
  </div>
</div></div>

<div class="wrap">
  <div class="phead">
    <div class="eyebrow" id="crumb"><a href="index.html" style="color:var(--sage)">Events</a></div>
    <h1 id="title">Loading...</h1>
    <div class="sub" id="sub"></div>
    <div class="summary" id="summary"></div>
  </div>

  <div id="banners"></div>
  <div id="followups"></div>

  <div class="tabs" id="tabs"></div>
  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search name, company, title...">
    <label class="tog"><input type="checkbox" id="includeUnknown"> Include contacts with no listed city</label>
  </div>
  <div class="tablecard">
    <table>
      <thead><tr>
        <th style="width:16%">Name</th><th style="width:16%">Company</th><th style="width:20%">Title</th>
        <th style="width:150px">Status</th><th style="width:210px">Email</th><th>Why / notes</th>
      </tr></thead>
      <tbody id="rows"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="pager" id="pager"></div>

  <div class="sectionrow"><h2>Other events around this date</h2><span class="note">good to scout, or for Bill to attend</span></div>
  <div id="nearby"></div>

  <div class="foot" id="foot"></div>
</div>
<script src="assets/js/data.js"></script>
<script src="assets/js/score.js"></script>
<script src="assets/js/event.js"></script>
</body>
</html>
